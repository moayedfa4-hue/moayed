<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة تلاواتي</title>
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* أنيميشن الخلفية */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(58, 123, 213, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        h1 {
            margin-top: 40px;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            animation: fadeInDown 1s ease-out;
        }

        .input-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px rgba(255, 255, 255, 0.1) solid;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 40px;
            animation: zoomIn 0.8s ease;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            outline: none;
            margin-bottom: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 10px var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s;
            animation: fadeInUp 0.5s ease forwards;
        }

        .video-card:hover {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-color);
        }

        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body>

    <h1>🎧 مكتبة التلاوات المختارة</h1>

    <div class="input-container">
        <input type="text" id="videoLink" placeholder="ضع رابط يوتيوب هنا...">
        <button onclick="addVideo()">إضافة إلى القائمة</button>
    </div>

    <div class="video-grid" id="videoGrid">
        </div>

    <script>
        function addVideo() {
            const urlInput = document.getElementById('videoLink');
            const videoGrid = document.getElementById('videoGrid');
            const url = urlInput.value;

            if (url === "") {
                alert("من فضلك ضع رابطاً أولاً");
                return;
            }

            // استخراج ID الفيديو من الرابط
            const videoId = extractVideoId(url);

            if (videoId) {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <iframe src="https://www.youtube.com/embed/${videoId}" 
                            allowfullscreen></iframe>
                `;
                videoGrid.prepend(card);
                urlInput.value = ""; // مسح الخانة بعد الإضافة
            } else {
                alert("الرابط غير صحيح، تأكد أنه رابط يوتيوب");
            }
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
    </script>
</body>
</html>
